name: Update World Cup Results

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest World Cup results
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: node scripts/update-results.mjs

      - name: Commit changed results
        run: |
          if git diff --quiet -- data/worldcup.json data/summary.json data/summary-history.json; then
            echo "No result or summary changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/worldcup.json data/summary.json data/summary-history.json
          git commit -m "chore: update World Cup results"
          git push
