<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haynes World Cup 2026 Sweepstake</title>
    <meta
      name="description"
      content="A pixel art sweepstake tracker for the 2026 football World Cup."
    />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scanline" aria-hidden="true"></div>
    <header class="site-header">
      <section class="hero" aria-labelledby="hero-title">
        <div class="retro-banner">
          <img
            class="banner-image"
            src="assets/haynes-world-cup-pixel-banner.png"
            alt=""
            decoding="async"
          />
          <div class="banner-overlay" aria-hidden="true"></div>
          <h1 class="banner-text" id="hero-title">
            <span>Haynes</span>
            <span>World Cup</span>
            <span>2026</span>
          </h1>
        </div>
      </section>
    </header>

    <main>
      <section class="site-controls" aria-label="Site controls">
        <div class="nav-links">
          <a href="index.html">Table</a>
          <a href="history.html">History</a>
        </div>
        <div class="status-pill" id="data-status">Loading results...</div>
      </section>

      <section class="summary-strip" aria-label="Tournament summary">
        <div>
          <span class="summary-value" id="player-count">0</span>
          <span class="summary-label">people</span>
        </div>
        <div>
          <span class="summary-value" id="played-count">0</span>
          <span class="summary-label">matches played</span>
        </div>
        <div>
          <span class="summary-value" id="goal-count">0</span>
          <span class="summary-label">goals</span>
        </div>
        <div>
          <span class="summary-value" id="next-kickoff">TBC</span>
          <span class="summary-label">next match</span>
        </div>
      </section>

      <section class="ai-summary-band" aria-labelledby="ai-summary-title">
        <div class="ai-summary" id="ai-summary">
          <p class="eyebrow">AI punditry</p>
          <h2 id="ai-summary-title">Waiting for the first proper wobble.</h2>
          <p>Once the hourly update sees a result change, this will get spicy.</p>
        </div>
      </section>

      <section class="content-band" id="leaderboard">
        <div class="section-heading">
          <p class="eyebrow">The draw</p>
          <h2>Leaderboard</h2>
        </div>
        <div class="leaderboard" id="leaderboard-list" aria-live="polite"></div>
      </section>

      <section class="content-band fixtures-band">
        <div class="section-heading">
          <p class="eyebrow">Form guide</p>
          <h2>Recent and next fixtures</h2>
        </div>
        <div class="fixture-grid" id="fixture-list"></div>
      </section>
    </main>

    <template id="leader-card-template">
      <article class="leader-card">
        <div class="rank"></div>
        <div class="pixel-avatar"></div>
        <div class="leader-main">
          <h3></h3>
          <div class="team-picks"></div>
          <div class="mini-record"></div>
        </div>
        <div class="points-box">
          <strong></strong>
          <span>pts</span>
        </div>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
